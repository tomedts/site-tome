<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomé Despachante - Em Manutenção</title>
    <style>
        :root {
            --primary: #000000;
            --accent: #ffd700;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f9f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .logo {
            max-width: 250px;
            margin-bottom: 30px;
        }
        h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .divider {
            height: 4px;
            width: 60px;
            background-color: var(--accent);
            margin: 0 auto 20px;
        }
        p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-whatsapp {
            display: inline-block;
            background-color: #25d366;
            color: white;
            padding: 18px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn-whatsapp:hover {
            transform: scale(1.05);
            background-color: #128c7e;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Tomé Despachante" class="logo" onerror="this.src='https://via.placeholder.com/250x100?text=TOME+DESPACHANTE'">
        
        <h1>Site em Manutenção</h1>
        <div class="divider"></div>
        <p>Estamos atualizando nosso sistema para trazer mais<br>agilidade aos seus processos.<br><strong>Voltaremos em breve!</strong></p>
        
        <a href="https://wa.me/5513996036192" class="btn-whatsapp" target="_blank">
            FALAR COM O DESPACHANTE AGORA
        </a>
    </div>

</body>
</html>
